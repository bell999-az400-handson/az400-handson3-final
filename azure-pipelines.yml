# azure-pipelines.yml - Complete CI/CD Pipeline
trigger:
  branches:
    include:
    - main
  paths:
    include:
    - backend/**

pr:
  branches:
    include:
    - main

variables:
  buildConfiguration: 'Release'
  NUGET_PACKAGES: $(Pipeline.Workspace)/.nuget/packages
  # System.Debug: true  # デバッグ時のみ有効化

stages:
# ステージ 1: ビルドとテスト
- stage: Build
  displayName: 'Build and Test'
  jobs:
  - job: Build
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    # .NET のセットアップ
    - task: UseDotNet@2
      displayName: 'Use .NET 8.0'
      inputs:
        version: '8.0.x'
    
    # NuGet キャッシュ
    - task: Cache@2
      displayName: 'Cache NuGet Packages'
      continueOnError: true
      inputs:
        key: 'nuget | "$(Agent.OS)" | backend/backend.csproj, backend.Tests/backend.Tests.csproj, backend/packages.lock.json'
        restoreKeys: |
          nuget | "$(Agent.OS)"
        path: $(NUGET_PACKAGES)
    
    # 依存関係の復元
    - task: DotNetCoreCLI@2
      displayName: 'Restore Dependencies'
      inputs:
        command: 'restore'
        projects: '**/*.csproj'
    
    # ビルド
    - task: DotNetCoreCLI@2
      displayName: 'Build Solution'
      inputs:
        command: 'build'
        projects: '**/*.csproj'
        arguments: '--configuration $(buildConfiguration) --no-restore'
    
    # テスト
    - task: DotNetCoreCLI@2
      displayName: 'Run Tests'
      continueOnError: true
      inputs:
        command: 'test'
        projects: 'backend.Tests/backend.Tests.csproj'
        arguments: '--configuration $(buildConfiguration) --no-build --collect:"XPlat Code Coverage"'
    
    # コードカバレッジレポート
    - task: PublishCodeCoverageResults@2
      displayName: 'Publish Code Coverage'
      continueOnError: true
      inputs:
        codeCoverageTool: 'Cobertura'
        summaryFileLocation: '$(Agent.TempDirectory)/**/coverage.cobertura.xml'
    
    # 発行
    - task: DotNetCoreCLI@2
      displayName: 'Publish Application'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: 'backend/backend.csproj'
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)'
        zipAfterPublish: true
    
    # アーティファクトの発行
    - task: PublishBuildArtifacts@1
      displayName: 'Publish Build Artifacts'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'

# ステージ 2: セキュリティスキャン
- stage: Security
  displayName: 'Security Scan'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: SecurityScan
    displayName: 'Security Vulnerability Scan'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    # .NET SDK のインストール（一貫性のため）
    - task: UseDotNet@2
      displayName: 'Install .NET SDK'
      inputs:
        packageType: 'sdk'
        version: '8.0.x'
    
    # 脆弱性スキャン（推移的な依存関係を含む）
    - script: |
        echo "Running comprehensive security vulnerability scan..."
        echo "Checking for vulnerable packages (including transitive dependencies)..."
        
        # 脆弱性をチェック
        dotnet list backend/backend.csproj package --vulnerable --include-transitive
        
        # 脆弱性が見つかった場合はビルドを失敗させる
        if dotnet list backend/backend.csproj package --vulnerable --include-transitive 2>&1 | grep -q "has the following vulnerable packages"; then
          echo "##vso[task.logissue type=error]Vulnerable packages detected! Please update dependencies."
          exit 1
        else
          echo "✅ No vulnerable packages found."
        fi
      displayName: 'Vulnerability Scan (Include Transitive)'

# ステージ 3: デプロイ（Dev環境）
# 注意: デプロイ前に az400-vm が起動していることを確認してください
# az vm start --resource-group rg-az400-handson3 --name az400-vm
- stage: DeployDev
  displayName: 'Deploy to Dev'
  dependsOn: Security
  jobs:
  # 条件チェックジョブ（常に実行してスキップ理由を表示）
  - job: CheckDeploymentConditions
    displayName: 'Check Deployment Conditions'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - script: |
        echo "=========================================="
        echo "🔍 Deployment Condition Check"
        echo "=========================================="
        echo ""
        echo "Current Branch:  $(Build.SourceBranch)"
        echo "Required Branch: refs/heads/main"
        echo ""
        echo "Previous Stage:  Security"
        echo "Previous Status: $(Agent.JobStatus)"
        echo ""
        
        # ブランチ条件のチェック
        if [ "$(Build.SourceBranch)" = "refs/heads/main" ]; then
          echo "✅ Branch Condition: PASSED"
          echo "   → Deployment will proceed"
        else
          echo "⊘ Branch Condition: NOT MET"
          echo "   → Deployment will be SKIPPED"
          echo ""
          echo "📌 Reason:"
          echo "   This is a Pull Request or feature branch"
          echo "   Deployment only runs when code is merged to 'main' branch"
          echo ""
          echo "📋 What happens:"
          echo "   - Build stage: ✅ Executed"
          echo "   - Security stage: ✅ Executed"
          echo "   - Deploy stage: ⊘ SKIPPED (by design)"
        fi
        
        echo ""
        echo "=========================================="
      displayName: 'Display Deployment Conditions'
      condition: always()
  
  # 実際のデプロイジョブ（main ブランチのみ）
  - deployment: DeployDevJob
    displayName: 'Deploy to Dev Environment'
    dependsOn: CheckDeploymentConditions
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    pool:
      vmImage: 'ubuntu-latest'
    environment: 'Development'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadBuildArtifacts@1
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'drop'
              downloadPath: '$(System.ArtifactsDirectory)'
          
          # アーティファクトを解凍
          - task: ExtractFiles@1
            displayName: 'Extract Published Files'
            inputs:
              archiveFilePatterns: '$(System.ArtifactsDirectory)/drop/*.zip'
              destinationFolder: '$(System.ArtifactsDirectory)/extracted'
          
          # SSH経由でVMにファイルをコピー
          - task: CopyFilesOverSSH@0
            displayName: 'Copy Files to VM'
            inputs:
              sshEndpoint: 'az400-vm-ssh'
              sourceFolder: '$(System.ArtifactsDirectory)/extracted'
              contents: '**'
              targetFolder: '/var/www/backend'
              cleanTargetFolder: true
              overwrite: true
          
          # VMでアプリケーションを再起動
          - task: SSH@0
            displayName: 'Restart Application on VM'
            inputs:
              sshEndpoint: 'az400-vm-ssh'
              runOptions: 'inline'
              inline: |
                # アプリケーションを停止（既存のプロセスがあれば）
                sudo pkill -f "dotnet.*backend.dll" || true
                
                # systemd サービスファイルを作成（初回のみ）
                if [ ! -f /etc/systemd/system/backend.service ]; then
                  sudo tee /etc/systemd/system/backend.service > /dev/null <<EOF
                [Unit]
                Description=Backend API Service
                After=network.target

                [Service]
                Type=simple
                WorkingDirectory=/var/www/backend
                ExecStart=/usr/bin/dotnet /var/www/backend/backend.dll
                Restart=always
                RestartSec=10
                User=azureuser
                Environment=ASPNETCORE_ENVIRONMENT=Production
                Environment=ASPNETCORE_URLS=http://0.0.0.0:5000

                [Install]
                WantedBy=multi-user.target
                EOF
                
                  sudo systemctl daemon-reload
                  sudo systemctl enable backend.service
                fi
                
                # Application Insights Connection String を環境変数として設定
                # Managed Identity で Azure CLI にログイン
                az login --identity --allow-no-subscriptions
                
                # Application Insights の接続文字列を取得して systemd override に設定
                CONN_STRING=$(az monitor app-insights component show --app az400-appinsights --resource-group rg-az400-handson3 --query connectionString -o tsv)
                sudo mkdir -p /etc/systemd/system/backend.service.d
                sudo tee /etc/systemd/system/backend.service.d/override.conf > /dev/null <<EOF
                [Service]
                Environment=APPLICATIONINSIGHTS_CONNECTION_STRING=$CONN_STRING
                EOF
                
                sudo systemctl daemon-reload
                
                # サービスを起動
                sudo systemctl restart backend.service
                
                # ステータス確認
                sleep 3
                sudo systemctl status backend.service --no-pager
              readyTimeout: '20000'

# ステージ 4: 負荷テスト
- stage: LoadTest
  displayName: 'Load Testing'
  dependsOn: DeployDev
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - job: RunLoadTest
    displayName: 'Run Load Test'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    # Azure CLI のセットアップ
    - task: AzureCLI@2
      displayName: 'Run Azure Load Test'
      inputs:
        azureSubscription: 'Azure-Service-Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo "=========================================="
          echo "🚀 Starting Load Test Execution"
          echo "=========================================="
          
          # Azure Load Testing 拡張機能のインストール
          az extension add --name load --yes || az extension update --name load --yes
          
          # Load Test の実行（JMeter スクリプトを使用）
          echo "📊 Running load test with JMeter script..."
          
          # テストの実行（既存のテストを実行、または新規作成）
          TEST_ID=$(az load test list \
            --load-test-resource az400-loadtest \
            --resource-group rg-az400-handson3 \
            --query "[?displayName=='users-api-load-test'].testId" -o tsv)
          
          if [ -z "$TEST_ID" ]; then
            echo "⚠️  Test 'users-api-load-test' not found. Please create it manually first."
            echo "   Navigate to: Azure Portal → az400-loadtest → Tests → Create"
            exit 1
          fi
          
          echo "✅ Found test ID: $TEST_ID"
          
          # テストの実行
          echo "🏃 Starting test run..."
          RUN_ID=$(az load test-run create \
            --load-test-resource az400-loadtest \
            --resource-group rg-az400-handson3 \
            --test-id "$TEST_ID" \
            --display-name "Pipeline Run $(Build.BuildNumber)" \
            --description "Automated load test from Azure Pipeline" \
            --query "testRunId" -o tsv)
          
          echo "✅ Test run started: $RUN_ID"
          
          # テストの完了を待機
          echo "⏳ Waiting for test completion..."
          MAX_WAIT=600  # 10分
          ELAPSED=0
          
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS=$(az load test-run show \
              --load-test-resource az400-loadtest \
              --resource-group rg-az400-handson3 \
              --test-run-id "$RUN_ID" \
              --query "status" -o tsv)
            
            echo "   Current status: $STATUS (${ELAPSED}s elapsed)"
            
            if [ "$STATUS" = "DONE" ] || [ "$STATUS" = "FAILED" ]; then
              break
            fi
            
            sleep 30
            ELAPSED=$((ELAPSED + 30))
          done
          
          # 結果の取得
          echo ""
          echo "=========================================="
          echo "📈 Load Test Results"
          echo "=========================================="
          
          az load test-run show \
            --load-test-resource az400-loadtest \
            --resource-group rg-az400-handson3 \
            --test-run-id "$RUN_ID" \
            --query "{Status:status, StartTime:startDateTime, EndTime:endDateTime, VirtualUsers:testRunStatistics.totalRequests}" -o table
          
          # メトリクスの取得
          echo ""
          echo "🎯 Performance Metrics:"
          az load test-run metrics list \
            --load-test-resource az400-loadtest \
            --resource-group rg-az400-handson3 \
            --test-run-id "$RUN_ID" \
            --metric-namespace LoadTestRunMetrics \
            --metric-name response_time_ms \
            --aggregation Average \
            --query "value[].{Time:timeStamp, AvgResponseTime:average}" -o table | head -20
          
          # 失敗チェック
          if [ "$STATUS" = "FAILED" ]; then
            echo "##vso[task.logissue type=error]Load test failed!"
            exit 1
          fi
          
          echo ""
          echo "✅ Load test completed successfully"
          echo "=========================================="
