# azure-pipelines.yml - Complete CI/CD Pipeline
trigger:
  branches:
    include:
    - main
  paths:
    include:
    - backend/**

pr:
  branches:
    include:
    - main

variables:
  buildConfiguration: 'Release'
  NUGET_PACKAGES: $(Pipeline.Workspace)/.nuget/packages
  # System.Debug: true  # デバッグ時のみ有効化

stages:
# ステージ 1: ビルドとテスト
- stage: Build
  displayName: 'Build and Test'
  jobs:
  - job: Build
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    # .NET のセットアップ
    - task: UseDotNet@2
      displayName: 'Use .NET 8.0'
      inputs:
        version: '8.0.x'
    
    # NuGet キャッシュ
    - task: Cache@2
      displayName: 'Cache NuGet Packages'
      continueOnError: true
      inputs:
        key: 'nuget | "$(Agent.OS)" | backend/backend.csproj, backend.Tests/backend.Tests.csproj, backend/packages.lock.json'
        restoreKeys: |
          nuget | "$(Agent.OS)"
        path: $(NUGET_PACKAGES)
    
    # 依存関係の復元
    - task: DotNetCoreCLI@2
      displayName: 'Restore Dependencies'
      inputs:
        command: 'restore'
        projects: '**/*.csproj'
    
    # ビルド
    - task: DotNetCoreCLI@2
      displayName: 'Build Solution'
      inputs:
        command: 'build'
        projects: '**/*.csproj'
        arguments: '--configuration $(buildConfiguration) --no-restore'
    
    # テスト
    - task: DotNetCoreCLI@2
      displayName: 'Run Tests'
      continueOnError: true
      inputs:
        command: 'test'
        projects: 'backend.Tests/backend.Tests.csproj'
        arguments: '--configuration $(buildConfiguration) --no-build --collect:"XPlat Code Coverage"'
    
    # コードカバレッジレポート
    - task: PublishCodeCoverageResults@2
      displayName: 'Publish Code Coverage'
      continueOnError: true
      inputs:
        codeCoverageTool: 'Cobertura'
        summaryFileLocation: '$(Agent.TempDirectory)/**/coverage.cobertura.xml'
    
    # 発行
    - task: DotNetCoreCLI@2
      displayName: 'Publish Application'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: 'backend/backend.csproj'
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)'
        zipAfterPublish: true
    
    # アーティファクトの発行
    - task: PublishBuildArtifacts@1
      displayName: 'Publish Build Artifacts'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'

# ステージ 2: セキュリティスキャン
- stage: Security
  displayName: 'Security Scan'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: Test
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - script: |
        echo "Running security vulnerability scan..."
        # 実際には OWASP Dependency Check などを実行
        dotnet list backend/backend.csproj package --vulnerable
      displayName: 'Vulnerability Scan'

# ステージ 3: デプロイ（Dev環境）
# 注意: デプロイ前に az400-vm が起動していることを確認してください
# az vm start --resource-group rg-az400-handson3 --name az400-vm
- stage: DeployDev
  displayName: 'Deploy to Dev'
  dependsOn: Security
  jobs:
  # 条件チェックジョブ（常に実行してスキップ理由を表示）
  - job: CheckDeploymentConditions
    displayName: 'Check Deployment Conditions'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - script: |
        echo "=========================================="
        echo "🔍 Deployment Condition Check"
        echo "=========================================="
        echo ""
        echo "Current Branch:  $(Build.SourceBranch)"
        echo "Required Branch: refs/heads/main"
        echo ""
        echo "Previous Stage:  Security"
        echo "Previous Status: $(Agent.JobStatus)"
        echo ""
        
        # ブランチ条件のチェック
        if [ "$(Build.SourceBranch)" = "refs/heads/main" ]; then
          echo "✅ Branch Condition: PASSED"
          echo "   → Deployment will proceed"
        else
          echo "⊘ Branch Condition: NOT MET"
          echo "   → Deployment will be SKIPPED"
          echo ""
          echo "📌 Reason:"
          echo "   This is a Pull Request or feature branch"
          echo "   Deployment only runs when code is merged to 'main' branch"
          echo ""
          echo "📋 What happens:"
          echo "   - Build stage: ✅ Executed"
          echo "   - Security stage: ✅ Executed"
          echo "   - Deploy stage: ⊘ SKIPPED (by design)"
        fi
        
        echo ""
        echo "=========================================="
      displayName: 'Display Deployment Conditions'
      condition: always()
  
  # 実際のデプロイジョブ（main ブランチのみ）
  - deployment: DeployDevJob
    displayName: 'Deploy to Dev Environment'
    dependsOn: CheckDeploymentConditions
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    pool:
      vmImage: 'ubuntu-latest'
    environment: 'Development'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadBuildArtifacts@1
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'drop'
              downloadPath: '$(System.ArtifactsDirectory)'
          
          # アーティファクトを解凍
          - task: ExtractFiles@1
            displayName: 'Extract Published Files'
            inputs:
              archiveFilePatterns: '$(System.ArtifactsDirectory)/drop/*.zip'
              destinationFolder: '$(System.ArtifactsDirectory)/extracted'
          
          # SSH経由でVMにファイルをコピー
          - task: CopyFilesOverSSH@0
            displayName: 'Copy Files to VM'
            inputs:
              sshEndpoint: 'az400-vm-ssh'
              sourceFolder: '$(System.ArtifactsDirectory)/extracted'
              contents: '**'
              targetFolder: '/var/www/backend'
              cleanTargetFolder: true
              overwrite: true
          
          # VMでアプリケーションを再起動
          - task: SSH@0
            displayName: 'Restart Application on VM'
            inputs:
              sshEndpoint: 'az400-vm-ssh'
              runOptions: 'inline'
              inline: |
                # アプリケーションを停止（既存のプロセスがあれば）
                sudo pkill -f "dotnet.*backend.dll" || true
                
                # systemd サービスファイルを作成（初回のみ）
                if [ ! -f /etc/systemd/system/backend.service ]; then
                  sudo tee /etc/systemd/system/backend.service > /dev/null <<EOF
                [Unit]
                Description=Backend API Service
                After=network.target

                [Service]
                Type=simple
                WorkingDirectory=/var/www/backend
                ExecStart=/usr/bin/dotnet /var/www/backend/backend.dll
                Restart=always
                RestartSec=10
                User=azureuser
                Environment=ASPNETCORE_ENVIRONMENT=Production
                Environment=ASPNETCORE_URLS=http://0.0.0.0:5000

                [Install]
                WantedBy=multi-user.target
                EOF
                
                  sudo systemctl daemon-reload
                  sudo systemctl enable backend.service
                fi
                
                # Application Insights Connection String を環境変数として設定
                # Managed Identity で Azure CLI にログイン
                az login --identity --allow-no-subscriptions
                
                # Application Insights の接続文字列を取得して systemd override に設定
                CONN_STRING=$(az monitor app-insights component show --app az400-appinsights --resource-group rg-az400-handson3 --query connectionString -o tsv)
                sudo mkdir -p /etc/systemd/system/backend.service.d
                sudo tee /etc/systemd/system/backend.service.d/override.conf > /dev/null <<EOF
                [Service]
                Environment=APPLICATIONINSIGHTS_CONNECTION_STRING=$CONN_STRING
                EOF
                
                sudo systemctl daemon-reload
                
                # サービスを起動
                sudo systemctl restart backend.service
                
                # ステータス確認
                sleep 3
                sudo systemctl status backend.service --no-pager
              readyTimeout: '20000'
